<!DOCTYPE html>
<html>

<script id="vertex-shader" type="x-shader/x-vertex">
attribute vec4 vPosition;
attribute vec4 vNormal;

uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;
uniform mat4 translation;
uniform vec4 lightPosition;

varying vec3 L, N, V;

attribute vec2 vTexCoord;
varying vec2 fTexCoord;

void main()
{
    // Combine per-object transform with the camera transform
    mat4 mv = modelViewMatrix * translation;

    // Vertex position in eye space
    vec3 posEye = (mv * vPosition).xyz;

    // Normal in eye space
    // (works correctly for rotation + uniform scale; if you add non-uniform scale later,
    // switch to inverse-transpose normal matrix)
    vec3 nEye = normalize((mv * vec4(vNormal.xyz, 0.0)).xyz);

    // Light vector in eye space
    vec3 lEye = normalize(lightPosition.xyz - posEye);

    // View vector in eye space (camera at origin in eye space)
    vec3 vEye = normalize(-posEye);

    L = lEye;
    N = nEye;
    V = vEye;
    fTexCoord = vTexCoord;
    gl_Position = projectionMatrix * vec4(posEye, 1.0);
}
</script>

<script id="fragment-shader" type="x-shader/x-fragment">

precision mediump float;

uniform vec4 lightDiffuse, lightSpecular, lightAmbient;
uniform vec4 materialDiffuse, materialSpecular, materialAmbient;
uniform float shininess;
varying vec3 L, N, V;
varying vec4 fColor;
varying vec2 fTexCoord;

uniform sampler2D tex0;

void main()
{
    //Diffuse
    //Id = Ld kd dot(l • n)
    vec4 diffuse = lightDiffuse * materialDiffuse * dot(L, N);

    //Specular
    //r = (2 (l · n ) n) - l
    vec3 R = 2.0 * (dot(L, N) * N) - L;

    //Is = Ls Ks dot(V, R)^a
    vec4 specular = lightSpecular * materialSpecular * pow(max(dot(V, R), 0.0), shininess);

    //Ambient
    //Ia = Laka
    vec4 ambient = lightAmbient * materialAmbient;

    vec4 fColor = diffuse + specular + ambient;
	fColor.a = 1.0;

    gl_FragColor = fColor;
}
</script>
